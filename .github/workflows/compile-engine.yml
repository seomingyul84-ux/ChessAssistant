name: Extract ChessAssistant Stockfish Engine
on:
  push:
    branches: [ main ] 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  extract-engine:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 20

    - name: Download & Extract Verified Stockfish WASM Engine
      run: |
        # 1. 검증된 브라우저 전용 stockfish 패키지 임시 설치
        npm install stockfish
        
        # 2. 내 프로젝트의 public 폴더 생성
        mkdir -p public
        
        # 3. 패키지 내부에 이미 완벽하게 빌드되어 있는 stockfish.js 파일을 우리 경로로 복사
        # (C++ 컴파일 과정을 건너뛰고 기성품 마스터 엔진을 직배송)
        cp node_modules/stockfish/src/stockfish.js public/stockfish.js
        
        echo "=== [ChessAssistant] 검증된 정품 스톡피시 엔진 추출 완료! ==="

    - name: Commit & Push Compiled Engine
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 [ChessAssistant] 완벽하게 검증된 스톡피시 🚀 엔진 이식 완료!"
        file_pattern: 'public/stockfish.js'
