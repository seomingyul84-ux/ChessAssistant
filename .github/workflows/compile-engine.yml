name: Compile ChessAssistant Stockfish 17 Light
on:
  push:
    branches: [ main ] 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Emscripten (emsdk)
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.61 

    - name: Clone Official Stockfish 17 & Compile
      run: |
        # 1. 스톡피시 공식 최신 소스코드 다운로드
        git clone https://github.com/official-stockfish/Stockfish.git
        cd Stockfish/src
        
        # [핵심 튜닝] 2. NNUE 소스들을 전부 포함하되, 클래식 전용(-DNO_NNUE)과 Wasm 안전 옵션을 동시에 주입
        echo "=== 1단계: 하위 폴더 포함 모든 C++ 소스코드 고속 컴파일 ==="
        emcc -c *.cpp nnue/*.cpp syzygy/*.cpp -O3 -flto -DARCH=general-32 -DNO_NNUE
        
        # 3. 구워진 모든 오브젝트 파일들을 한 장의 자바스크립트로 결합
        echo "=== 2단계: 수제 ChessAssistant 단일 자바스크립트 엔진 추출 ==="
        emcc *.o -o stockfish17-light.js \
          -O3 \
          -flto \
          -s EXPORTED_RUNTIME_METHODS="['stringToUTF8']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s ENVIRONMENT="worker" \
          -s MODULARIZE=1 \
          -s EXPORT_NAME="'Stockfish17Light'" \
          --single-file
          
    - name: Deploy Engine to Public Folder
      run: |
        mkdir -p public
        cp Stockfish/src/stockfish17-light.js public/stockfish.js

    - name: Commit & Push Compiled Engine
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 [ChessAssistant] 수제 초경량 클래식 스톡피시 17 엔진 컴파일 완수!"
        file_pattern: 'public/stockfish.js'
