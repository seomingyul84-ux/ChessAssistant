name: Compile ChessAssistant Stockfish 17 Light
on:
  push:
    branches: [ main ] 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Emscripten (emsdk)
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.61 

    - name: Clone Official Stockfish 17 & Compile
      run: |
        # 1. 스톡피시 공식 최신 소스코드 다운로드
        git clone https://github.com/official-stockfish/Stockfish.git
        cd Stockfish/src
        
        # [수정포인트] 2. 개별 C++ 파일들을 고속으로 먼저 컴fight(오브젝트화) 진행
        # 오타 수정: DEMBERDED -> EMBEDDED
        echo "=== 1단계: 개별 소스코드 컴파일 진행 ==="
        emcc -c *.cpp -O3 -flto -DEMBEDDED_SMALL_NNUE
        
        # [수정포인트] 3. 컴파일된 결과물(.o)들을 하나의 자바스크립트 파일로 싱글 바인딩(Link)
        echo "=== 2단계: 단일 자바스크립트 파일로 링킹 및 추출 ==="
        emcc *.o -o stockfish17-light.js \
          -O3 \
          -flto \
          -s EXTRA_EXPORTED_RUNTIME_METHODS="['stringToUTF8']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s ENVIRONMENT="worker" \
          -s MODULARIZE=1 \
          -s EXPORT_NAME="'Stockfish17Light'" \
          --single-file
          
    - name: Deploy Engine to Public Folder
      run: |
        mkdir -p public
        cp Stockfish/src/stockfish17-light.js public/stockfish.js

    - name: Commit & Push Compiled Engine
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 [ChessAssistant] 수제 초경량 스톡피시 17 엔진 컴파일 완수!"
        file_pattern: 'public/stockfish.js'
