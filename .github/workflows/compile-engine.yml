name: Compile ChessAssistant Stockfish 17 Light
on:
  push:
    branches: [ main ] 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Emscripten (emsdk)
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.61 

    - name: Clone & Compile via Official Makefile
      run: |
        # 1. 스톡피시 공식 최신 소스코드 다운로드
        git clone https://github.com/official-stockfish/Stockfish.git
        cd Stockfish/src
        
        # [해결포인트] 2. 공식 Makefile 시스템을 이용하되, 컴파일러를 emcc로 바꿔치기
        # target을 'generic32'로 주고 'no-nnue=yes'를 주면 Wasm 환경에 최적화된 클래식 빌드가 됨
        echo "=== 1단계: 스톡피시 공식 Makefile 빌드 시스템 구동 ==="
        make build ARCH=generic32 COMP=emcc COMPCXX=em++ no-nnue=yes -j$(nproc)
        
        # [해결포인트] 3. 빌드가 완료되어 생성된 실행파일을 웹 워커용 단일 js 파일로 후가공
        echo "=== 2단계: ChessAssistant 웹 워커용 싱글 스크립트 최종 링킹 ==="
        emcc stockfish -o stockfish17-light.js \
          -O3 \
          -flto \
          -s EXPORTED_RUNTIME_METHODS="['stringToUTF8']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s ENVIRONMENT="worker" \
          -s MODULARIZE=1 \
          -s EXPORT_NAME="'Stockfish17Light'" \
          --single-file
          
    - name: Deploy Engine to Public Folder
      run: |
        mkdir -p public
        cp Stockfish/src/stockfish17-light.js public/stockfish.js

    - name: Commit & Push Compiled Engine
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 [ChessAssistant] 수제 초경량 클래식 스톡피시 17 엔진 컴파일 완수!"
        file_pattern: 'public/stockfish.js'
