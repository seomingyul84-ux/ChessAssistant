name: Compile ChessAssistant Stockfish 17 Light
on:
  push:
    branches: [ main ] 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Emscripten (emsdk)
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.61 

    - name: Clone & Compile via Official Emscripten Target
      run: |
        # 1. 스톡피시 공식 최신 소스코드 다운로드
        git clone https://github.com/official-stockfish/Stockfish.git
        cd Stockfish/src
        
        # [해결포인트] 2. Makefile에 내장된 emscripten 전용 타겟 직접 호출
        # no-nnue=yes를 함께 주어 뚱뚱한 NNUE 다운로드와 임베딩을 완벽히 차단하고 클래식으로 빌드
        echo "=== 1단계: 스톡피시 공식 Emscripten 빌드 파이프라인 가동 ==="
        make emscripten no-nnue=yes -j$(nproc)
        
        # [해결포인트] 3. 생성된 stockfish.js 파일을 ChessAssistant 규격에 맞게 이름 변경
        echo "=== 2단계: 파일 추출 및 네이밍 정렬 ==="
        cp stockfish.js stockfish17-light.js
          
    - name: Deploy Engine to Public Folder
      run: |
        mkdir -p public
        cp Stockfish/src/stockfish17-light.js public/stockfish.js

    - name: Commit & Push Compiled Engine
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 [ChessAssistant] 수제 초경량 클래식 스톡피시 17 엔진 컴파일 완수!"
        file_pattern: 'public/stockfish.js'
