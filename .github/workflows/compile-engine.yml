name: Compile ChessAssistant Stockfish 17 Light
on:
  push:
    branches: [ main ] # 코드가 main 브랜치에 업데이트되면 자동으로 엔진 제작 가동
  workflow_dispatch: # 깃허브 웹페이지에서 수동으로 [Run workflow] 버튼을 눌러 실행할 수도 있게 만듦

permissions:
  contents: write # 컴파일된 엔진 파일을 다시 내 저장소에 저장할 수 있는 권한 부여

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Emscripten (emsdk)
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.61 # 검증된 안정적인 엠스크립텐 버전 고정

    - name: Clone Official Stockfish 17 & Compile
      run: |
        # 1. 스톡피시 공식 최신 소스코드 다운로드
        git clone https://github.com/official-stockfish/Stockfish.git
        cd Stockfish/src
        
        # 2. Emscripten(emcc)을 사용해 초경량 NNUE 임베딩 모드로 컴파일
        emcc *.cpp -o stockfish17-light.js \
          -O3 \
          -flto \
          -DEMBERDED_SMALL_NNUE \
          -s EXTRA_EXPORTED_RUNTIME_METHODS="['stringToUTF8']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s ENVIRONMENT="worker" \
          -s MODULARIZE=1 \
          -s EXPORT_NAME="'Stockfish17Light'" \
          --single-file
          
    - name: Deploy Engine to Public Folder
      run: |
        # public 폴더가 없으면 만들고, 컴파일된 엔진을 배달
        mkdir -p public
        cp Stockfish/src/stockfish17-light.js public/stockfish.js

    - name: Commit & Push Compiled Engine
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 [ChessAssistant] 수제 초경량 스톡피시 17 엔진 컴파일 완수!"
        file_pattern: 'public/stockfish.js'
