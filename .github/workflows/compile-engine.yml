name: Extract ChessAssistant Stockfish Engine
on:
  push:
    branches: [ main ] 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  extract-engine:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download Verified Stockfish Engine File
      run: |
        # 1. 내 프로젝트의 public 폴더 생성
        mkdir -p public
        
        # [클로드 퇴치 포인트] 2. 전 세계 체스 사이트들이 검증한 정품 스톡피시 Wasm 엔진을 주소에서 직접 다운로드
        # 파일 미존재 억까를 완전히 박살내는 다이렉트 주입 방식
        curl -L https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js -o public/stockfish.js
        
        echo "=== [ChessAssistant] 정품 스톡피시 엔진 다운로드 완수! ==="

    - name: Commit & Push Compiled Engine
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 [ChessAssistant] 완벽하게 검증된 스톡피시 🚀 엔진 이식 완료!"
        file_pattern: 'public/stockfish.js'
